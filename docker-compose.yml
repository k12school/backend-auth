version: '3.8'

services:
  # ============================================
  # POSTGRES - Application Database
  # ============================================
  k12-postgres:
    image: postgres:17-alpine
    container_name: k12-postgres
    ports:
      - "15432:5432"  # External 15432 -> Internal 5432 for jOOQ code generation
    environment:
      POSTGRES_USER: k12_user
      POSTGRES_PASSWORD: k12_password
      POSTGRES_DB: k12_db
    volumes:
      - k12-postgres-data:/var/lib/postgresql/data
      # Init scripts if needed
      - ./monitoring/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - k12-monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U k12_user -d k12_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  k12-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: k12-backend
    ports:
      - "8080:8080"  # HTTP API
    environment:
      # Quarkus configuration
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_USERNAME: k12_user
      QUARKUS_DATASOURCE_PASSWORD: k12_password
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://k12-postgres:5432/k12_db

      # JWT configuration
      JWT_SECRET: k12-default-secret-key-for-jwt-token-signing-min-256-bits

      # Logging configuration for SigNoz
      QUARKUS_LOG_LEVEL: INFO
      QUARKUS_LOG_CATEGORY_"com.k12"_LEVEL: INFO

      # OpenTelemetry resource attributes
      OTEL_SERVICE_NAME: k12-backend
      OTEL_RESOURCE_ATTRIBUTES: service.name=k12-backend,deployment.environment=local
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=k12-backend"
    networks:
      - k12-monitoring
    depends_on:
      k12-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  k12-monitoring:
    name: k12-monitoring
    external: false

volumes:
  k12-backend-data:
    name: k12-backend-data
  k12-postgres-data:
    name: k12-postgres-data
