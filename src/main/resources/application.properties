# Quarkus configuration
quarkus.application.name=k12-backend

# HTTP port configuration
%test.quarkus.http.port=8080

# CORS configuration
# SECURITY WARNING - TODO: MUST BE CONFIGURED FOR PRODUCTION
# Currently allows all origins for development convenience
# Before production, restrict to specific allowed origins
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,HEAD,PATCH
quarkus.http.cors.headers=*
quarkus.http.cors.exposed-headers=Content-Disposition,Content-Type,Authorization
quarkus.http.cors.access-control-max-age=3600

# DataSource configuration
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=k12_user
quarkus.datasource.password=k12_password
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:15432/k12_db
quarkus.datasource.jdbc.max-size=50
%test.quarkus.datasource.jdbc.max-size=50

# Flyway configuration
quarkus.flyway.enabled=true
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=false
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.clean-disabled=false
%test.quarkus.flyway.clean-at-start=true

# SmallRye OpenAPI configuration
quarkus.smallrye-openapi.info-title=K12 Backend API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=K12 School Management System Backend API
quarkus.smallrye-openapi.servers=http://localhost:8080
quarkus.smallrye-openapi.scan-packages=com.k12.user.infrastructure.rest.resource,com.k12.tenant.infrastructure.rest.resource
quarkus.smallrye-openapi.inherit-interfaces=true

# Micrometer metrics configuration
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.binder.http-server.enabled=true
quarkus.micrometer.export.prometheus.path=/metrics

# Reduce Micrometer logging noise
quarkus.log.category."io.quarkus.micrometer".level=INFO
quarkus.log.category."io.vertx".level=INFO

# JWT configuration
jwt.secret=${JWT_SECRET:k12-default-secret-key-for-jwt-token-signing-min-256-bits}
jwt.expiration=86400000

# Security configuration
quarkus.security.enabled=true

# MicroProfile JWT configuration for Quarkus (RS256 with RSA keys)
# This is the officially recommended approach for Quarkus 3.31.x
# Public key location (on classpath) for token verification
mp.jwt.verify.publickey.location=/keys/public-key.pem
mp.jwt.verify.algorithm=RS256
mp.jwt.verify.issuer=k12-api
quarkus.smallrye-jwt.enabled=true

# Log level configuration
quarkus.log.level=INFO
quarkus.log.category."com.k12".level=INFO
quarkus.log.category."com.k12.infrastructure.security".level=INFO
quarkus.log.category."com.k12.infrastructure.multitenancy".level=INFO
quarkus.log.category."io.smallrye.jwt".level=WARN
quarkus.log.category."io.quarkus.security".level=WARN
quarkus.log.category."io.quarkus.security.jwt".level=WARN

# Console formatting fallback (if JSON logging disabled)
quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.console.level=INFO
quarkus.log.console.darken=1

# File logging configuration
quarkus.log.file.enabled=true
quarkus.log.file.path=log/k12-backend.log
quarkus.log.file.level=INFO
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n
quarkus.log.file.rotation.max-backup-index=5
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd

# Dev mode configuration
%dev.quarkus.hibernate-validator.fail-fast=true
%dev.quarkus.log.level=DEBUG
%dev.quarkus.log.category."io.jsonwebtoken".level=INFO
%dev.quarkus.log.file.enabled=true
%dev.quarkus.log.file.path=log/k12-backend-dev.log
%dev.quarkus.log.file.level=DEBUG
%dev.quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n

# Test mode configuration
%test.quarkus.datasource.username=test
%test.quarkus.datasource.password=test
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/k12_test_db
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.flyway.clean-disabled=false
%test.quarkus.flyway.connect-retries=10
%test.quarkus.log.level=INFO
%test.quarkus.log.category."com.k12".level=DEBUG
%test.quarkus.log.category."org.flywaydb".level=DEBUG
%test.quarkus.log.file.enabled=true
%test.quarkus.log.file.path=log/k12-backend-test.log
%test.quarkus.log.file.level=DEBUG
