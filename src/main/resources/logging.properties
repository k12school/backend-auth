# JBoss Log Manager Configuration for OpenTelemetry Log Export

# Global log level
.level=INFO

# Root logger handlers
handlers=java.util.logging.ConsoleHandler,com.k12.infrastructure.logging.OpenTelemetryLogHandler

# Console Handler configuration
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=org.jboss.logmanager.formatters.PatternFormatter
java.util.logging.ConsoleHandler.properties=autoFlush,target,enabled
java.util.logging.ConsoleHandler.autoFlush=true
java.util.logging.ConsoleHandler.target=System.out
java.util.logging.ConsoleHandler.enabled=true

# Pattern for console output
java.util.logging.ConsoleHandler.formatter.pattern=%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c{3.}] (%t) %s%e%n

# OpenTelemetry Log Handler
com.k12.infrastructure.logging.OpenTelemetryLogHandler.level=INFO
com.k12.infrastructure.logging.OpenTelemetryLogHandler.formatter=org.jboss.logmanager.formatters.PatternFormatter
com.k12.infrastructure.logging.OpenTelemetryLogHandler.enabled=true
com.k12.infrastructure.logging.OpenTelemetryLogHandler.autoFlush=true

# Application-specific log levels
com.k12.level=INFO
org.jooq.level=INFO
org.flywaydb.level=INFO

# OpenTelemetry logging
io.opentelemetry.level=INFO
io.quarkus.opentelemetry.level=INFO
