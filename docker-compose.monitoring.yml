# Monitoring Stack: SigNoz + Compatible Components
# Usage: docker-compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
#
# NOTE: SigNoz currently provides UI and backend, but requires additional components
# for full trace/metric/log ingestion. See monitoring/SIGNOZ_TRACES_TEST_REPORT.md for details.

services:
  # ============================================
  # CLICKHOUSE - SigNoz Database Backend
  # ============================================
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: k12-clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native interface
    environment:
      CLICKHOUSE_DB: signoz
      CLICKHOUSE_USER: root
      CLICKHOUSE_PASSWORD: password
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # SIGNOZ - Observability Platform (UI + Backend)
  # ============================================
  signoz:
    image: signoz/signoz:latest  # Enterprise Edition
    container_name: k12-signoz
    depends_on:
      clickhouse:
        condition: service_healthy
    ports:
      - "3301:8080"  # SigNoz frontend UI (external 3301 -> internal 8080)
    environment:
      - CLICKHOUSE_DATABASE=signoz
      - CLICKHOUSE_USER=root
      - CLICKHOUSE_PASSWORD=password
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=9000
      - SIGNOZ_TELEMETRY_ENABLED=false
      - SIGNOZ_VERSION_CHECK_ENABLED=false
      - SIGNOZ_TELEMETRYSTORE_PROVIDER=clickhouse
      - SIGNOZ_TOKENIZER_JWT_SECRET=change-this-to-a-strong-random-secret-key-min-32-chars
      - QUERY_CACHE_PATH=/var/lib/signoz/cache
    volumes:
      - signoz-data:/var/lib/signoz
    networks:
      - monitoring
    restart: unless-stopped

  # ============================================
  # NODE EXPORTER - Host Metrics (Compatible)
  # ============================================
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: k12-node-exporter
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - monitoring

  # ============================================
  # CADVISOR - Container Metrics (Compatible)
  # ============================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51.0
    container_name: k12-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - monitoring

  # ============================================
  # POSTGRES EXPORTER - Database Metrics (Compatible)
  # ============================================
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: k12-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://k12_user:k12_password@host.docker.internal:15432/k12_db?sslmode=disable"
    ports:
      - "9187:9187"
    network_mode: host
    restart: unless-stopped

  # ============================================
  # UPTIME KUMA - External Monitoring (Independent)
  # ============================================
  uptime-kuma:
    image: louislam/uptime-kuma:1.23.15
    container_name: k12-uptime-kuma
    volumes:
      - uptime-kuma-data:/app/data
    network_mode: host
    restart: unless-stopped

networks:
  monitoring:
    driver: bridge
    name: k12-monitoring

volumes:
  clickhouse-data:
    name: k12-clickhouse-data
  signoz-data:
    name: k12-signoz-data
  uptime-kuma-data:
    name: k12-uptime-kuma-data

# =============================================================================
# REMOVED SERVICES (conflicted with SigNoz):
# =============================================================================
#
# REMOVED: prometheus
#   Reason: SigNoz provides metrics storage and querying
#   Action: Stopped, volume preserved (k12-prometheus-data)
#
# REMOVED: grafana
#   Reason: SigNoz provides built-in dashboards and visualization
#   Action: Stopped, volume preserved (k12-grafana-data)
#
# REMOVED: loki
#   Reason: SigNoz provides log aggregation and querying
#   Action: Stopped, volume preserved (k12-loki-data)
#
# REMOVED: promtail
#   Reason: Log collector for Loki (no longer needed)
#   Action: Stopped
#
# REMOVED: tempo
#   Reason: SigNoz provides distributed tracing
#   Action: Stopped, volume preserved (k12-tempo-data)
#
# REMOVED: otel-collector
#   Reason: Conflicts with SigNoz architecture (see note below)
#   Action: Stopped
#
# =============================================================================
# IMPORTANT NOTE: SigNoz Configuration
# =============================================================================
#
# The current signoz/signoz:latest image includes:
#   ✅ UI and Backend (port 8080 → 3301)
#   ✅ ClickHouse integration
#   ✅ API endpoints
#   ✅ Dashboards and visualization
#   ❌ NO OTLP receiver (traces/metrics/logs cannot be ingested)
#
# To make SigNoz fully functional for trace ingestion, you need to either:
#
# Option 1: Use Official SigNoz Docker Compose (RECOMMENDED)
#   Download: https://github.com/SigNoz/signoz/blob/main/deploy/docker/
#   Includes: signoz-backend, signoz-otelia, clickhouse, alert-manager
#   Status: Complete, working solution
#
# Option 2: Keep Tempo for Traces
#   Tempo is already working and can coexist with SigNoz
#   Use Tempo for traces, SigNoz for metrics/logs/UI
#   Status: Minimal setup required
#
# Option 3: Direct Integration
#   Configure Quarkus to export metrics directly to SigNoz
#   Requires: Additional OTLP receiver component
#   Status: Requires research and setup
#
# Current State:
#   - UI: ✅ Accessible at http://localhost:3301
#   - Backend: ✅ Running and connected to ClickHouse
#   - Traces: ❌ Cannot ingest (missing OTLP receiver)
#   - Metrics: ❌ Cannot ingest (missing OTLP receiver)
#
# Next Steps:
#   1. Choose one of the options above
#   2. See monitoring/SIGNOZ_TRACES_TEST_REPORT.md for full details
#   3. See monitoring/SIGNOZ_FIX_REPORT.md for UI fix documentation
#
# =============================================================================
