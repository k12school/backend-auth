# Official SigNoz Monitoring Stack - Full Setup with ZooKeeper
# Based on: https://github.com/SigNoz/signoz/main/deploy/docker/docker-compose.yaml

services:
  # ============================================
  # INIT CLICKHOUSE - Run setup scripts
  # ============================================
  init-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: k12-init-clickhouse
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mkdir -p /var/lib/clickhouse/user_scripts
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    volumes:
      - k12-clickhouse-data:/var/lib/clickhouse
      - ./monitoring/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
    networks:
      - k12-monitoring
    restart: on-failure

  # ============================================
  # ZOOKEEPER - Required for ClickHouse cluster
  # ============================================
  zookeeper:
    image: signoz/zookeeper:3.7.1
    container_name: k12-zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
    volumes:
      - k12-zookeeper-data:/bitnami/zookeeper
    networks:
      - k12-monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ============================================
  # CLICKHOUSE - Database with cluster setup
  # ============================================
  clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: k12-clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native interface
    volumes:
      - k12-clickhouse-data:/var/lib/clickhouse/
      - ./monitoring/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ./monitoring/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ./monitoring/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ./monitoring/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - ./monitoring/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
    environment:
      - CLICKHOUSE_SKIP_USER_SETUP=1
    networks:
      - k12-monitoring
    depends_on:
      init-clickhouse:
        condition: service_completed_successfully
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================
  # SIGNOZ OTEL COLLECTOR - Receives telemetry
  # ============================================
  signoz-otel-collector:
    image: signoz/signoz-otel-collector:latest
    container_name: k12-signoz-otel-collector
    command:
      - --config=/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"  # OTLP gRPC receiver
      - "4318:4318"  # OTLP HTTP receiver
    volumes:
      - ./monitoring/signoz-otel-collector-config.yaml:/etc/otel-collector-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=k12-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    networks:
      - k12-monitoring
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # SIGNOZ TELEMETRY STORE MIGRATOR - Creates databases
  # ============================================
  signoz-telemetrystore-migrator:
    image: signoz/signoz-otel-collector:latest
    container_name: k12-signoz-telemetrystore-migrator
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    networks:
      - k12-monitoring
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: on-failure

  # ============================================
  # SIGNOZ - Frontend & Backend UI
  # ============================================
  signoz:
    image: signoz/signoz:latest
    container_name: k12-signoz
    ports:
      - "3301:8080"  # Frontend UI
    environment:
      - SIGNOZ_TELEMETRY_ENABLED=false
      - SIGNOZ_TELEMETRYSTORE_PROVIDER=clickhouse
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - OTEL_COLLECTOR_ENDPOINT=k12-signoz-otel-collector:4317
      - STORAGE=clickhouse
      - SIGNOZ_TOKENIZER_JWT_SECRET=k12-jwt-secret-min-32-chars-change-for-production
    volumes:
      - k12-signoz-data:/var/lib/signoz/
    networks:
      - k12-monitoring
    depends_on:
      signoz-otel-collector:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  k12-monitoring:
    name: k12-monitoring

volumes:
  k12-clickhouse-data:
    name: k12-clickhouse-data
  k12-signoz-data:
    name: k12-signoz-data
  k12-zookeeper-data:
    name: k12-zookeeper-data
