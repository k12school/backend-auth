# SigNoz OpenTelemetry Collector Configuration
# Receives telemetry from Quarkus and exports to ClickHouse

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

extensions:
  # Health check extension
  health_check:
    endpoint: 0.0.0.0:13133

  # PProf extension for profiling
  pprof:
    endpoint: 0.0.0.0:1777

exporters:
  # SigNoz ClickHouse exporter for traces
  clickhouse/traces:
    endpoint: tcp://clickhouse:9000
    database: signoz
    username: root
    password: password
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # SigNoz ClickHouse exporter for metrics
  clickhouse/metrics:
    endpoint: tcp://clickhouse:9000
    database: signoz
    username: root
    password: password
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

  # SigNoz ClickHouse exporter for logs
  clickhouse/logs:
    endpoint: tcp://clickhouse:9000
    database: signoz
    username: root
    password: password
    timeout: 10s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

service:
  extensions: [health_check, pprof]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse/traces]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse/metrics]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse/logs]
