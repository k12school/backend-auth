# OpenTelemetry Collector Configuration for K12 Backend
# Full SigNoz Migration - Exports traces and metrics to SigNoz

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # Debug exporter - logs to console for verification
  debug:
    verbosity: detailed

  # SigNoz OTLP exporter - sends traces and metrics to SigNoz
  otlp/signoz:
    endpoint: localhost:4319  # SigNoz gRPC OTLP receiver (4319:4317)
    tls:
      insecure: true

service:
  pipelines:
    # Traces pipeline - sends to SigNoz
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/signoz]

    # Metrics pipeline - sends to SigNoz
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/signoz]
