# OpenTelemetry Collector Configuration for K12 Backend

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:

exporters:
  # Debug exporter - logs traces to console for verification
  debug:
    verbosity: detailed

  # OTLP exporter - sends traces to Tempo
  # Note: Tempo listens on port 14317 (not 4317) to avoid conflict with collector
  otlp/tempo:
    endpoint: http://localhost:14317
    tls:
      insecure: true

  # Prometheus remote write for metrics
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, otlp/tempo]

    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheusremotewrite]
