# Promtail Configuration for K12 Backend Logs

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

client:
  url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # K12 Backend application logs
  - job_name: k12-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: k12-backend
          environment: development
          __path__: /var/log/k12/*.log

    # Parse log entries
    pipeline_stages:
      # Extract timestamp from log format: 2025-02-24 10:30:45,123
      - regex:
          expression: '^(?P<timestamp>\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}:\d{2},\d{3})\s+(?P<level>\w+)\s+\[(?P<logger>[^\]]+)\]\s+\((?P<thread>[^)]+)\)\s+(?P<message>.+)$'

      # Extract structured fields from JSON logs if present
      - json:
          expressions:
            trace_id: trace_id
            span_id: span_id
            tenant_id: tenant_id
            user_id: user_id
            request_id: request_id

      # Set log level
      - labels:
          level:
          tenant_id:
          trace_id:

      # Timestamp parsing
      - timestamp:
          source: timestamp
          format: "2006-01-02 15:04:05,000"

  # System logs (optional)
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          host: ${HOSTNAME:-localhost}
        __path__: /var/log/syslog
