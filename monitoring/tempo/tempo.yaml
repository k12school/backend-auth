# Tempo Distributed Tracing Storage Configuration

server:
  http_listen_address: 0.0.0.0
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:14317  # Different port to avoid conflict with collector
        http:
          endpoint: 0.0.0.0:14318  # Different port to avoid conflict with collector

storage:
  trace:
    backend: local
    wal:
      path: /tmp/tempo/wal
    local:
      path: /tmp/tempo/blocks
